query_id: hybrid_assembly_001
family: hybrid_assembly
nl_text: "I have both Illumina short reads and Oxford Nanopore long reads from a bacterial strain. I want to use both datasets together for a more accurate hybrid assembly."
difficulty: hard
tool_specificity: goal_specified
context:
  read_type: hybrid
  organism_type: bacteria

