query_id: sc_clustering_001
family: sc_clustering
nl_text: "I have preprocessed scRNA-seq data with PCA done. I want to cluster the cells into biologically meaningful groups."
difficulty: medium
tool_specificity: goal_specified
context:
  assay: scrna_seq
  n_cells: 100

gold:
  tier_1_canonical:
    tools: [leiden]
    expected_output_criteria:
      has_cluster_column: true
      n_clusters_min: 1

  tier_2_alternative:
    tools: [louvain]
    functional_equivalence_criteria:
      has_cluster_column: ">= 1.0"
      n_clusters_min: ">= 1.0"

  tier_3_invalid:
    tools: [kmeans, DESeq2, STAR]
