query_id: chip_alignment_001
family: chip_alignment
nl_text: "I have ChIP-seq FASTQ files for H3K27ac histone modification. I need to align the reads to the mouse mm10 genome before calling peaks."
difficulty: easy
tool_specificity: goal_specified
context:
  assay: chip_narrow
  organism: mus_musculus

gold:
  tier_1_canonical:
    tools: [Bowtie2]
    expected_output_criteria:
      mapping_rate: ">= 0.85"
      has_sorted_bam: true
  tier_2_alternative:
    tools: [BWA-MEM2]
    functional_equivalence_criteria:
      mapping_rate: ">= 0.80"
  tier_3_invalid:
    tools: [STAR, kallisto]
