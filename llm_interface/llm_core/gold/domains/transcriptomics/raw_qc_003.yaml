      has_per_base_quality: true

  tier_2_alternative:
    tools: [MultiQC]
    functional_equivalence_criteria:
      has_html_report: ">= 1.0"

  tier_3_invalid:
    tools: [BWA-MEM2, STAR, HISAT2]

  adversarial_override:
