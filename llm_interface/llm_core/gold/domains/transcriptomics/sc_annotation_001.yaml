query_id: sc_annotation_001
family: sc_annotation
nl_text: "I have clustered single-cell RNA-seq data. I want to automatically annotate the cell types of each cluster using a reference database."
difficulty: hard
tool_specificity: goal_specified
context:
  assay: scrna_seq
  has_clusters: true

gold:
  tier_1_canonical:
    tools: [scType]
    expected_output_criteria:
      has_cell_type_column: true

  tier_2_alternative:
    tools: [CellTypist, SingleR]
    functional_equivalence_criteria:
      has_cell_type_column: ">= 1.0"

  tier_3_invalid:
    tools: [leiden, kmeans, DESeq2]
