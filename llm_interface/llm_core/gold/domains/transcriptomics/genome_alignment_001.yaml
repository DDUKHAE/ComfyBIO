query_id: genome_alignment_001
family: genome_alignment
nl_text: "I have trimmed Illumina short-read RNA-seq FASTQs. I need to align them to the human reference genome (hg38) and obtain sorted BAM files."
difficulty: medium
tool_specificity: goal_specified
context:
  data_type: short_read
  organism: homo_sapiens

gold:
  tier_1_canonical:
    tools: [STAR]
    expected_output_criteria:
      mapping_rate: ">= 0.8"
      has_sorted_bam: true

  tier_2_alternative:
    tools: [HISAT2]
    functional_equivalence_criteria:
      mapping_rate: ">= 0.7"

  tier_3_invalid:
    tools: [minimap2, BWA-MEM2]
