query_id: genome_alignment_002
family: genome_alignment
nl_text: "I have trimmed Illumina RNA-seq FASTQs from mouse samples. I need to align them to the mouse reference genome mm10 with splice-aware alignment."
difficulty: medium
tool_specificity: goal_specified
context:
  data_type: short_read
  organism: mus_musculus

gold:
  tier_1_canonical:
    tools: [STAR]
    expected_output_criteria:
      mapping_rate: ">= 0.8"
      has_sorted_bam: true

  tier_2_alternative:
    tools: [HISAT2]
    functional_equivalence_criteria:
      mapping_rate: ">= 0.7"

  tier_3_invalid:
    tools: [BWA-MEM2, Bowtie2, minimap2]
