query_id: de_analysis_002
family: differential_expression
nl_text: "I have human bulk RNA-seq count data from a time-course experiment with 3 time points and 2 replicates each. I need to find genes with significant expression changes over time."
difficulty: medium
tool_specificity: goal_specified
context:
  data_type: bulk_rna_seq
  organism: homo_sapiens
  n_samples_per_group: 2

gold:
  tier_1_canonical:
    tools: [DESeq2]
    expected_output_criteria:
      has_log2fc_column: true
      has_padj_column: true

  tier_2_alternative:
    tools: [edgeR, limma_voom]
    functional_equivalence_criteria:
      has_log2fc_column: ">= 1.0"
      has_padj_column: ">= 1.0"

  tier_3_invalid:
    tools: [kallisto, STAR, scanpy, t_test]
